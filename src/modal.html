<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/reset.css" />
    <link rel="stylesheet" href="./styles/main.css" />
    <link rel="stylesheet" href="./styles/tab.css" />
    <link rel="stylesheet" href="./styles/thumbnail.css" />
    <link rel="stylesheet" href="./styles/modal.css" />
    <title>영화 리뷰</title>
  </head>
  <body>
    <div class="modal-background" id="modalBackground" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button class="close-modal" id="closeModal" type="button" aria-label="상세 정보 닫기">
          <img id="modalCloseIcon" alt="" aria-hidden="true" />
        </button>
        <div class="modal-container">
          <div class="modal-image">
            <img id="modalPosterImage" alt="" />
          </div>
          <div class="modal-description">
            <h2 id="modalTitle"></h2>
            <p class="category" id="modalCategory"></p>
            <p class="rate">
              <img id="modalRateIcon" class="star" alt="" aria-hidden="true" />
              <span id="modalRateValue"></span>
            </p>
            <hr />
            <p class="detail" id="modalDetail"></p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

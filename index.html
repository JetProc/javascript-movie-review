<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/styles/index.css" />
    <link rel="stylesheet" href="./src/styles/main.css" />
    <link rel="stylesheet" href="./src/styles/tab.css" />
    <link rel="stylesheet" href="./src/styles/thumbnail.css" />
    <title>영화 리뷰</title>
  </head>
  <body>
    <div id="app">
      <header class="site-header">
        <div class="site-header-inner">
          <a href="./" class="logo">
            <img src="./images/logo.png" alt="MovieList Icon" />
          </a>
          <form id="search-form" role="search">
            <label class="visually-hidden" for="search-input"> 영화 검색어 입력 </label>
            <div id="search-input-container">
              <input type="text" name="query" placeholder="검색어를 입력하세요" id="search-input" autocomplete="off" />
              <button type="submit" id="search-button" aria-label="영화 검색">
                <img src="./images/search-icon.png" alt="" aria-hidden="true" />
              </button>
            </div>
          </form>
        </div>
      </header>

      <section class="hero-section" id="hero-section" aria-label="대표 인기 영화">
        <div class="hero-backdrop" id="hero-backdrop">
          <div class="hero-overlay" aria-hidden="true"></div>
          <div class="hero-shell">
            <div class="hero-content">
              <div class="hero-rate" id="hero-rate">
                <img src="./images/star_empty.png" class="star" alt="star-rate" aria-hidden="true" />
                <span id="hero-rate-value"></span>
              </div>
              <h1 class="hero-title" id="hero-title"></h1>
              <button class="primary hero-detail-button" type="button">자세히 보기</button>
            </div>
          </div>
        </div>
      </section>

      <div class="container">
        <main>
          <section>
            <h2 class="movie-section-title"></h2>
            <div class="thumbnail-grid">
              <ul class="thumbnail-list"></ul>
              <ul class="skeleton-card"></ul>
            </div>
            <div class="no-result" hidden>
              <div class="no-result-content">
                <img class="no-result-image" src="./images/no-result-planet.png" alt="" aria-hidden="true" />
                <p class="no-result-text">검색 결과가 없습니다.</p>
              </div>
            </div>
          </section>
          <div id="infinite-scroll-sentinel" style="height: 1px"></div>
        </main>
      </div>

      <footer class="footer">
        <p><img src="./images/woowacourse_logo.png" width="180" /></p>
        <p>&copy; 우아한테크코스 All Rights Reserved.</p>
      </footer>
    </div>
    <dialog class="modal-background" id="modalBackground" aria-labelledby="modalTitle" aria-describedby="modalDetail">
      <article class="modal">
        <div class="modal-header">
          <button class="close-modal" id="closeModal" type="button" aria-label="상세 정보 닫기">
            <img id="modalCloseIcon" alt="" aria-hidden="true" />
          </button>
        </div>
        <div class="modal-container">
          <div class="modal-image">
            <img id="modalPosterImage" alt="" />
          </div>
          <div class="modal-description">
            <h2 id="modalTitle"></h2>
            <p class="category" id="modalCategory"></p>
            <p class="rate">
              <span class="modal-rate-label">평균</span>
              <img id="modalRateIcon" class="star" alt="" aria-hidden="true" />
              <span id="modalRateValue"></span>
            </p>
            <hr class="modal-divider" />
            <section class="my-rating-section" aria-labelledby="myRatingTitle">
              <h3 class="my-rating-title" id="myRatingTitle">내 별점</h3>
              <div class="my-rating-row">
                <div class="my-rating-stars" role="group" aria-label="내 별점 선택">
                  <button
                    class="my-rating-star-button"
                    type="button"
                    data-user-rating="2"
                    aria-label="2점 - 최악이에요"
                  >
                    <img src="./images/star_empty.png" alt="" aria-hidden="true" />
                  </button>
                  <button class="my-rating-star-button" type="button" data-user-rating="4" aria-label="4점 - 별로예요">
                    <img src="./images/star_empty.png" alt="" aria-hidden="true" />
                  </button>
                  <button
                    class="my-rating-star-button"
                    type="button"
                    data-user-rating="6"
                    aria-label="6점 - 보통이에요"
                  >
                    <img src="./images/star_empty.png" alt="" aria-hidden="true" />
                  </button>
                  <button
                    class="my-rating-star-button"
                    type="button"
                    data-user-rating="8"
                    aria-label="8점 - 재미있어요"
                  >
                    <img src="./images/star_empty.png" alt="" aria-hidden="true" />
                  </button>
                  <button
                    class="my-rating-star-button"
                    type="button"
                    data-user-rating="10"
                    aria-label="10점 - 명작이에요"
                  >
                    <img src="./images/star_empty.png" alt="" aria-hidden="true" />
                  </button>
                </div>
                <div class="my-rating-summary">
                  <span class="my-rating-message" id="myRatingMessage">별점을 남겨보세요</span>
                  <span class="my-rating-score" id="myRatingScore">(0/10)</span>
                </div>
              </div>
            </section>
            <hr class="modal-divider" />
            <section class="modal-detail-section" aria-labelledby="modalDetailTitle">
              <h3 class="modal-detail-title" id="modalDetailTitle">줄거리</h3>
              <p class="detail" id="modalDetail"></p>
            </section>
          </div>
        </div>
      </article>
    </dialog>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
